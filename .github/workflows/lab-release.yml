name: Daily lab release

# Publishes a GitOps build signal tag for lab automation to consume.
# Actual image build and push happen in the lab.

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA; default: main)'
        required: false
        default: 'main'

concurrency:
  group: lab-release
  cancel-in-progress: false  # Never cancel an in-flight release trigger

permissions:
  contents: write

jobs:
  dispatch-lab-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Resolve build ref and SHA
        id: resolve
        env:
          INPUT_REF: ${{ github.event.inputs.ref || github.ref }}
        run: |
          echo "ref=${INPUT_REF}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitOps lab-build tag
        env:
          BUILD_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          TAG="lab-build/${BUILD_SHA}"
          if REMOTE_REF="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}' | head -n1)" && [ -n "${REMOTE_REF}" ]; then
            if [ "${REMOTE_REF}" = "${BUILD_SHA}" ]; then
              echo "==> ${TAG} already exists at expected SHA; skipping"
              exit 0
            fi
            echo "ERROR: ${TAG} exists but points to ${REMOTE_REF}, expected ${BUILD_SHA}" >&2
            exit 1
          fi
          git tag "${TAG}" "${BUILD_SHA}"
          git push origin "${TAG}"
          echo "==> Published ${TAG}"
