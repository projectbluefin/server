name: Build DDI artifacts

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: just
      - name: Resolve element graph
        run: just validate

  trigger-lab:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish GitOps lab-build tag
        env:
          BUILD_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          TAG="lab-build/${BUILD_SHA}"
          if REMOTE_REF="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}' | head -n1)" && [ -n "${REMOTE_REF}" ]; then
            if [ "${REMOTE_REF}" = "${BUILD_SHA}" ]; then
              echo "==> ${TAG} already exists at expected SHA; skipping"
              exit 0
            fi
            echo "ERROR: ${TAG} exists but points to ${REMOTE_REF}, expected ${BUILD_SHA}" >&2
            exit 1
          fi
          git tag "${TAG}" "${BUILD_SHA}"
          git push origin "${TAG}"
