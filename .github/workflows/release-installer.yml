name: Release DDI installer

# Publishes a GitOps installer-build signal tag for lab automation to consume.
# Actual BST build and GitHub Release upload happen in the lab.
#
# Tag format: installer-v<fsdk-version>  e.g. installer-v25.08.13

on:
  push:
    tags:
      - 'installer-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. installer-v25.08.13)'
        required: true

concurrency:
  group: release-installer-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight release

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: just

      - name: Set up runner disk space
        run: |
          sudo mkdir -p /mnt/podman /mnt/buildstream
          sudo chown -R $USER:$USER /mnt/podman /mnt/buildstream
          # Redirect podman storage to /mnt/podman (74GB SSD)
          mkdir -p ~/.config/containers
          cat > ~/.config/containers/storage.conf <<EOF
          [storage]
          driver = "overlay"
          runroot = "/run/user/1001"
          graphroot = "/mnt/podman"
          EOF
          # Redirect BuildStream cache to /mnt/buildstream
          mkdir -p ~/.cache
          ln -s /mnt/buildstream ~/.cache/buildstream

      - name: Build and export DDI OS image
        run: |
          just build-ddi
          just export-ddi

      - name: Build and export live installer & target UKI
        run: |
          just build-installer
          just export-installer

      - name: Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          CLEAN_TAG="${TAG#refs/tags/}"
          echo "Uploading release assets for tag: ${CLEAN_TAG}"
          # Ensure the release exists on GitHub before uploading
          gh release create "${CLEAN_TAG}" --title "Bluefin Server v${CLEAN_TAG#installer-v}" --notes "Release ${CLEAN_TAG}" || true
          gh release upload "${CLEAN_TAG}" \
            dist/bluefin-server-installer-*.raw.zst \
            dist/bluefin-server-*.efi \
            dist/SHA256SUMS \
            dist/ddi/bluefin-server-ddi-*.raw.zst \
            dist/ddi/SHA256SUMS \
            --clobber
