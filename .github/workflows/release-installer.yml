name: Release DDI installer

# Publishes a GitOps installer-build signal tag for lab automation to consume.
# Actual BST build and GitHub Release upload happen in the lab.
#
# Tag format: installer-v<semver>  e.g. installer-v0.1.0

on:
  push:
    tags:
      - 'installer-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. installer-v0.1.0)'
        required: true

concurrency:
  group: release-installer-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight release

permissions:
  contents: write

jobs:
  dispatch-lab-installer-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: just

      - name: Resolve installer tag and SHA
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG="${INPUT_TAG#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate installer element graph (pre-flight)
        run: just validate-installer

      - name: Publish GitOps installer-build tag
        env:
          INSTALLER_TAG: ${{ steps.resolve.outputs.tag }}
          BUILD_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          SIGNAL_TAG="installer-build/${INSTALLER_TAG}"
          if REMOTE_REF="$(git ls-remote --tags origin "refs/tags/${SIGNAL_TAG}" | awk '{print $1}' | head -n1)" && [ -n "${REMOTE_REF}" ]; then
            if [ "${REMOTE_REF}" = "${BUILD_SHA}" ]; then
              echo "==> ${SIGNAL_TAG} already exists at expected SHA; skipping"
              exit 0
            fi
            echo "ERROR: ${SIGNAL_TAG} exists but points to ${REMOTE_REF}, expected ${BUILD_SHA}" >&2
            exit 1
          fi
          git tag "${SIGNAL_TAG}" "${BUILD_SHA}"
          git push origin "${SIGNAL_TAG}"
          echo "==> Published ${SIGNAL_TAG} -> ${BUILD_SHA}"
