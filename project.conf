name: bluefin-server

# Required BuildStream version
min-version: 2.5

# Subdirectory where elements are stored
element-path: elements

(@):
  - gnome-build-meta.bst:freedesktop-sdk.bst:include/runtime.yml
  - include/aliases.yml

options:
  arch:
    type: arch
    description: Machine architecture
    variable: arch
    values:
      - aarch64
      - x86_64

sandbox:
  build-arch: "%{arch}"

variables:
  # Single source of truth for asset versioning; must match the FSDK point release.
  release-version: "25.08.13"

# Pull-only: read from the shared GNOME + Bluefin BuildStream CAS caches.
artifacts:
  - url: https://gbm.gnome.org:11003
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180
  - url: https://cache.projectbluefin.io:11001
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180

source-caches:
  - url: https://gbm.gnome.org:11003
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180
  - url: https://cache.projectbluefin.io:11001
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180

plugins:
  - origin: junction
    junction: plugins/buildstream-plugins-community.bst
    sources:
      - git_repo
      - patch_queue
  - origin: junction
    junction: gnome-build-meta.bst
    elements:
      - collect_initial_scripts

sources:
  git_repo:
    config:
      ref-format: git-describe
