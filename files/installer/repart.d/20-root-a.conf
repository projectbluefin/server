# Root partition — slot A
# systemd-repart copies the DDI payload block-for-block from the embedded
# installer data partition on the boot medium.
# The source is a raw filesystem image; repart copies it verbatim.
[Partition]
Type=root
Label=bluefin-server-root-a
CopyBlocks=/dev/disk/by-partlabel/bluefin-installer-data
SizeMinBytes=4G
SizeMaxBytes=16G
GrowFileSystem=yes
