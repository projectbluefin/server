# /var partition — writable, persistent across updates
# FactoryReset=yes: wiped when installer runs with --factory-reset.
# GrowFileSystem=yes: ext4 grows to fill all remaining disk space after
#   the ESP and root-a partitions are placed.
[Partition]
Type=var
Label=var
Format=ext4
FactoryReset=yes
GrowFileSystem=yes
SizeMinBytes=4G
